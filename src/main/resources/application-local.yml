# Profil « local » — développement local sans Kafka ni Redis.
# Démarrage : SPRING_PROFILES_ACTIVE=local,demo
# ─────────────────────────────────────────────────────────────────────────────

spring:
  # Désactiver l'auto-configuration Kafka
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # R2DBC — PostgreSQL Docker (fleet-management-db) sur port hôte 5433
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/fleetmanBD
    username: fleet_admin
    password: fleet_password
    pool:
      enabled: true
      initial-size: 2
      max-size: 10
      validation-query: "SELECT 1"

  # JDBC — uniquement pour Liquibase
  datasource:
    url: jdbc:postgresql://localhost:5433/fleetmanBD
    username: fleet_admin
    password: fleet_password
    driver-class-name: org.postgresql.Driver

  # Liquibase — migrations au démarrage
  liquibase:
    url: jdbc:postgresql://localhost:5433/fleetmanBD
    user: fleet_admin
    password: fleet_password
    enabled: true

  # Redis Docker (port hôte 6380)
  data:
    redis:
      host: localhost
      port: 6380
      password: ""

  kafka:
    bootstrap-servers: ""

application:
  kafka:
    kernel-events:
      enabled: false

management:
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
    mail:
      enabled: false
