server:
  port: 8081

# Config Swagger
app:
  swagger:
    server-url: ${FLEET_SERVER_URL:https://traefikdev.yowyob.com/fleet-management}

spring:
  application:
    name: fleet-management
  
  profiles:
    active: local,demo

  # R2DBC (Application Runtime)

  r2dbc:
    url: r2dbc:postgresql://localhost:5433/fleetmanBD
    username: fleet_admin
    password: fleet_password
    pool:
      enabled: true
      initial-size: 2
      max-size: 10
      validation-query: "SELECT 1"
      max-idle-time: 10m

  # JDBC (Liquibase Migration)
  datasource:
    url: jdbc:postgresql://localhost:5433/fleetmanBD
    username: fleet_admin
    password: fleet_password
    driver-class-name: org.postgresql.Driver

  # LIQUIBASE
  liquibase:
    url: jdbc:postgresql://localhost:5433/fleetmanBD
    user: fleet_admin
    password: fleet_password
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
    liquibase-schema: public
    enabled: true
    contexts: local 
  # REDIS
  data:
    redis:
      host: localhost
      port: 6380
      password: ""

  # KAFKA
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: fleet-management-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  docker:
    compose:
      enabled: false

# CONFIG METIER
application:
  # ── Kernel RT-Comops ────────────────────────────────────────────────────────
  kernel:
    url: ${KERNEL_URL:https://kernel-core.yowyob.com}
    client-id: ${KERNEL_CLIENT_ID:fleet-management-backend}
    api-key: ${KERNEL_API_KEY:K5mWlNhc6zH2-JcaZJWSs1sLxUzjS902u4MxEnJar5g}
    tenant-id: ${KERNEL_TENANT_ID:f5b814d9-766e-4c87-91ec-d6c8e32cb56c}
    organization-id: ${KERNEL_ORG_ID:5e69f5c5-1f03-41cb-a4a3-d59188f73323}
    business-actor-id: ${KERNEL_BUSINESS_ACTOR_ID:54fb5d86-345e-4522-a247-5cbc1de510fc}
    organization-sync: ${KERNEL_ORG_SYNC:true}
