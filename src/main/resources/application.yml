  # Kafka topics
  kafka:
    topics:
      geofence-alerts: geofence-alerts-topic
      operation-events: operation-events-topic

# MONITORING
management:
  endpoints:
    web:
      exposure:
        include: ["health","info","prometheus"]
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Resilience4j
resilience4j:
  circuitbreaker:
    instances: {}

# Stockage fichiers (documents PDF / images)
fleetman:
  uploads:
    dir: uploads
    max-bytes: 10485760