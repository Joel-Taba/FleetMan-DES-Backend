# MONITORING & RESILIENCE
management:
  endpoints:
    web:
      exposure:
        include: [ "health", "info", "prometheus", "liveness", "readiness" ]
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      stock-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        slidingWindowSize: 5
